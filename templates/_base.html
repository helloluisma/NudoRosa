<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- #861742 = var(--vino): un <meta> no puede leer variables CSS,
         así que se repite el valor a mano acá y en manifest.webmanifest. -->
    <meta
        name="theme-color"
        content="#861742"
    >

    <link rel="manifest" href="{{ url_for('static', path='/manifest.webmanifest') }}">

    <!-- PWA en iOS/Safari no lee manifest.webmanifest para estos
         datos: hacen falta estas etiquetas aparte. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nudo Rosa">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/icons/apple-touch-icon.png') }}">

    <title>{% block title %}Nudo Rosa by Ivanna{% endblock %}</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='/css/styles.css') }}?v=11"
    >
</head>

<body>
    <main class="app{% if ocultar_barra_inferior %} app--sin-barra{% endif %}">
        {% block content %}{% endblock %}
        {% if not ocultar_barra_inferior %}
        {% include "_bottom_nav.html" %}
        {% endif %}
    </main>

    <!-- Aviso de instalación PWA: tarjeta propia (no el mini-infobar
         nativo del navegador), controlada desde app.js según el evento
         beforeinstallprompt. Vive en _base.html porque debe poder
         aparecer en cualquier pantalla, incluida /login. -->
    <div class="modal" id="install-pwa-modal" hidden>
        <div class="modal__backdrop"></div>

        <div
            class="modal__dialog confirm-modal__dialog install-modal__dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="install-modal-title"
        >
            <img
                class="install-modal__logo"
                src="{{ url_for('static', path='/images/logo.png') }}"
                alt="Nudo Rosa"
            >

            <p class="install-modal__title" id="install-modal-title">Instala Nudo Rosa</p>
            <p class="install-modal__texto">
                Agrega Nudo Rosa a tu celular para abrirla rápidamente como una aplicación.
            </p>

            <div class="confirm-modal__actions">
                <button type="button" class="confirm-modal__no" id="install-pwa-dismiss">
                    Ahora no
                </button>
                <button type="button" class="confirm-modal__yes" id="install-pwa-accept">
                    Instalar
                </button>
            </div>
        </div>
    </div>

    <!-- Tasa BCV vigente — la usan las pantallas que arman o
         recalculan montos en el cliente sin volver al servidor (ver
         formatoBolivares/formatoMoneda y sincronizarVentaCreada en
         app.js). null si todavía no hay ninguna tasa cargada. -->
    <script>window.TASA_BCV_ACTUAL = {{ tasa_bcv_valor() | tojson }};</script>
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
